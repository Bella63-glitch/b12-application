name: B12 Application Submission

on:
  workflow_dispatch:

jobs:
  submit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set Run ID
        run: echo "RUN_ID=${{ github.run_id }}" >> $GITHUB_ENV

      - name: Run submission script
        run: python apply.py
